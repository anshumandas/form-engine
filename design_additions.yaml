# ║  06_ui_design_additions.yaml  —  patch to v1.0.0                           ║
# ║                                                                              ║
# ║  Source analysis: 01_core · 02_schemata · 03_uam · 04_workflow · 06_utils  ║
# ║                                                                              ║
# ║  This file lists every change to be merged into 06_ui_design.yaml.         ║
# ║  Each block is tagged with its source namespace for traceability.           ║
# ║                                                                              ║
# ║  DECISION LOG — what was included and why                                   ║
# ║  ─────────────────────────────────────────────────────────────────────────  ║
# ║  INCLUDED                                                                   ║
# ║    schemata  UIPersistenceType  — every component needs a caching policy   ║
# ║    schemata  ChoiceRenderType   — how enum/choice fields render in UI       ║
# ║    schemata  SectionType        — section break markers in schema forms     ║
# ║    schemata  SchemaTagType      — tags with direct UI rendering impact      ║
# ║    schemata  DataType widget map— auto-selects default widget per type      ║       ║
# ║    utils     DurationType       — millisec values behind schedule display   ║
# ║    utils     OperatorType       — filter/condition builder UI operators     ║
# ║    utils     Pattern            — validation hint icons on input fields     ║
# ║    utils     File + Picture     — FileUpload and ImageGallery components    ║
# ║    uam       Role.preferences   — per-role UI preference overrides         ║
# ║    uam       User.profiles      — avatar / display-name config             ║
# ║                                                                            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝


properties_additions:

  widget_map:
    type: object
    additionalProperties: false
    description: >
      Maps schemata#DataType values to the default widget component name used
      when auto-rendering a schema-driven form or table column.
      Derived from the schemata#DataType.tags.ui tagValues; can be overridden
      per-component via Component.field_widget_overrides.

      Defaults reflect the tagValues column in 02_schemata.yaml:
        enum          → EnumFormField
        choice        → ChoiceFormField   (further refined by ChoiceRenderType)
        string        → TextFormField
        multiLineText → MultiLineTextFormField
        number        → NumberFormField
        boolean       → TristateCheckboxFormField
        date          → DatePickerFormField
        any           → AnyFormField
        id            → TextFormField
    properties:
      enum:
        type: string
        default: EnumFormField
      choice:
        type: string
        default: ChoiceFormField
      string:
        type: string
        default: TextFormField
      multiLineText:
        type: string
        default: MultiLineTextFormField
      number:
        type: string
        default: NumberFormField
      boolean:
        type: string
        default: TristateCheckboxFormField
      date:
        type: string
        default: DatePickerFormField
      any:
        type: string
        default: AnyFormField
      id:
        type: string
        default: TextFormField
      secret:
        type: string
        default: PasswordFormField
      reference:
        type: string
        default: SearchPickerFormField

  # SOURCE: 03_uam.yaml — uam#Role.preferences (Map<string>)
  role_preferences:
    type: object
    description: >
      Per-role UI preference overrides. Keys are uam#Role.roleName values.
      At runtime the engine merges the matching entry on top of the manifest
      defaults. Allows a role (e.g. Customer vs Employee) to get a different
      theme, default locale, or column visibility without a separate manifest.
    additionalProperties:
      $ref: "#/$defs/RolePreferenceOverride"

component_property_additions:

  # SOURCE: schemata#UIPersistence
  ui_persistence:
    $ref: "#/$defs/UIPersistenceType"
    description: >
      Caching/persistence strategy for this component's data.
      Overrides the manifest-level default.
        LRU          — least-recently-used cache; evicted when cache fills.
        Session      — cleared on session end (tab/app close).
        Profile      — persisted per user profile across sessions.
        AppFirstLoad — loaded once on first app launch; static thereafter.
        InApp        — in-memory only; lost on component unmount.

  # SOURCE: schemata#ChoiceType
  choice_render:
    $ref: "#/$defs/ChoiceRenderType"
    description: >
      How choice / enum fields are rendered inside this component.
      Overrides the field-level default derived from schemata#ChoiceType.

  # SOURCE: utils#File + utils#Picture
  file_config:
    $ref: "#/$defs/FileComponentConfig"
    description: >
      Required when type is FileGallery.
      Controls file type filters, thumbnail display, and upload policy.

  # SOURCE: utils#OperatorType + utils#Formula
  filter_config:
    $ref: "#/$defs/FilterBuilderConfig"
    description: >
      Required when type is FilterBuilder.
      Declares allowed operators and which schema fields can be filtered.

  # SOURCE: 03_uam.yaml — uam#User.profiles
  avatar_config:
    $ref: "#/$defs/AvatarConfig"
    description: >
      Required when type is Avatar.
      Controls which profile fields (nickName, photo) are displayed and
      the fallback initials strategy.

  # SOURCE: 02_schemata.yaml — Field.proField tag
  show_pro_fields:
    type: boolean
    default: false
    description: >
      When true, fields tagged proField (schemata#Tag) are shown.
      When false (default) they are hidden unless the user explicitly
      expands a "More options" section.

  # SOURCE: 02_schemata.yaml — Field.branching
  enable_branching:
    type: boolean
    default: true
    description: >
      When true, the component respects field-level branching rules
      (conditional field visibility driven by schemata#Field.branching).
      Disable for admin/debug views that must show all fields.

  # SOURCE: 02_schemata.yaml — schemata#Tag (sectioned)
  sectioned:
    type: boolean
    default: false
    description: >
      When true and the bound schema is tagged 'sectioned', the component
      groups its fields by schema-defined sections rather than rendering
      them as a flat list. Uses schemata#Field.sectionType markers.

  # SOURCE: 06_utils.yaml — utils#Pattern
  field_validation_hints:
    type: boolean
    default: true
    description: >
      When true, input fields show pattern-hint icons / inline format
      examples derived from their utils#Pattern (e.g. Phone, Email).

$defs:
  UIPersistenceType:
    # schemata#UIPersistence
    type: string
    description: >
      Controls when and how a component's fetched data is cached.
        LRU          — least-recently-used in-memory cache (default for Sets).
        Session      — browser/app session scope; cleared on close.
        Profile      — persisted to the user's profile store across sessions.
        AppFirstLoad — loaded once at app initialisation; read-only thereafter.
        InApp        — in-memory for the lifetime of the component mount only.
    enum: [LRU, Session, Profile, AppFirstLoad, InApp]

  ChoiceRenderType:
    # schemata#ChoiceType
    type: string
    description: >
      How a choice / enum field renders its options in a form or filter UI.
        radio    — radio button group (mutually exclusive, visible options).
        checkbox — checkbox group (multi-select).
        dropDown — dropdown select.
        autoFill — type-to-search autocomplete combobox.
        pick     — modal / drawer picker (for large option sets).
    enum: [radio, checkbox, dropDown, autoFill, pick]

  SectionBreakType:
    # schemata#SectionType
    type: string
    description: >
      Marker type for schema-driven section boundaries within a component.
        start    — opens a collapsible / titled section block.
        end      — closes the current section block.
        break    — visual divider line without a new section scope.
        continue — resumes a previously interrupted section.
    enum: [start, end, break, continue]

  SchemaTagType:
    # schemata#Tag — only tags with direct UI rendering impact
    type: string
    description: >
      Tags from schemata#Tag that directly affect UI rendering behaviour.
      The runtime reads these from schema field metadata.
        uiOnly        — field rendered in UI but never sent to the server.
        sectioned     — schema groups its fields into sections.
        proField      — hidden until user expands "More options".
        allowOthers   — free-text input allowed alongside enum options.
        linkedField   — value copied from / synced to another field.
        radio         — render this choice field as radio buttons.
        checkbox      — render this choice field as checkboxes.
        dropDown      — render this choice field as a dropdown.
        autoFill      — render this choice field as an autocomplete.
        pick          — render this choice field as a picker modal.
        switch        — render this boolean field as a toggle switch.
        csv           — multi-value field displayed as comma-separated chips.
    enum:
      [uiOnly, sectioned, proField, allowOthers, linkedField,
       radio, checkbox, dropDown, autoFill, pick, switch, csv]

  DurationType:
    # utils#Duration — tagValues carry millisecond equivalents
    type: string
    description: >
      [Mirror of utils#Duration — authoritative in 06_utils.yaml]
      Named duration units used in ScheduleIndicator countdowns.
      Each value has a canonical millisecond equivalent in the source:
        Day   =  86 400 000 ms
        Week  = 604 800 000 ms
        Month = 2 592 000 000 ms
        Year  = 31 536 000 000 ms
    enum: [Day, Week, Month, Year, Decade]

  OperatorType:
    # utils#OperatorType — subset relevant to filter/condition UI
    type: string
    description: >
      [Subset of utils#OperatorType relevant to FilterBuilder UI]
      Logical and comparison operators the FilterBuilder component exposes
      when constructing a utils#Formula condition.
      The full set is in 06_utils.yaml; only comparison and logical operators
      are UI-relevant. Arithmetic operators (squared, cubed, times, plus, etc.)
      are formula-engine concerns, not filter-builder UI concerns.
    enum:
      [and, or, not,
       equals, unequals, "is", "is not",
       "greater than", "less than",
       "greater than or equal to", "less than or equal to",
       "in", "not in", exists, be]

  FileComponentConfig:
    type: object
    additionalProperties: false
    description: >
      Controls the FileGallery component that lists utils#File and utils#Picture
      records. A Picture inherits File and adds a thumbPath field.
    properties:
      allow_pictures:
        type: boolean
        default: true
        description: Show utils#Picture records with thumbnails.
      allow_files:
        type: boolean
        default: true
        description: Show generic utils#File records.
      allowed_file_types:
        type: array
        description: >
          MIME type or extension allow-list. Empty = all types permitted.
          Example: [image/jpeg, image/png, application/pdf]
        items:
          type: string
      max_file_size_mb:
        type: number
        minimum: 0
        default: 20
      upload_enabled:
        type: boolean
        default: false
        description: Show an upload button. Requires uam#Auth.upload = true.
      delete_enabled:
        type: boolean
        default: false
        description: Show delete controls. Requires uam#Auth.deactivate = true.
      download_enabled:
        type: boolean
        default: true
        description: Show download links. Requires uam#Auth.download = true.
      thumbnail_size:
        type: string
        enum: [small, medium, large]
        default: medium
        description: >
          Size of picture thumbnails in gallery view.
          Uses utils#Picture.thumbPath when available.
      layout:
        type: string
        enum: [grid, list]
        default: grid
        description: >
          grid — picture-first gallery view.
          list — file-name / metadata row view (better for non-image files).
      category_filter:
        type: boolean
        default: false
        description: >
          Show a filter control for utils#File.category when true.
      tag_filter:
        type: boolean
        default: false
        description: Show a filter control for utils#File.tags.


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  FILTER BUILDER CONFIG  (06_utils.yaml — utils#OperatorType + Formula)  ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  FilterBuilderConfig:
    type: object
    additionalProperties: false
    description: >
      Controls the FilterBuilder component. Lets users build structured
      utils#Formula conditions using a visual UI backed by utils#OperatorType.
      The built formula is forwarded to DataBinding.query_params or a custom
      action handler.
    properties:
      filterable_fields:
        type: array
        description: >
          Names of schema fields that can be used as filter operands.
          An empty list means all non-secret, non-proField fields are available.
        items:
          type: string
        uniqueItems: true
      allowed_operators:
        type: array
        description: >
          Which OperatorType values are shown in the operator dropdown.
          Defaults to the comparison + logical subset (see OperatorType def).
        items:
          $ref: "#/$defs/OperatorType"
        uniqueItems: true
      max_conditions:
        type: integer
        minimum: 1
        default: 10
        description: Maximum number of condition rows the user may add.
      allow_nesting:
        type: boolean
        default: false
        description: >
          When true, allows grouped sub-conditions (AND / OR nesting).
          Results in nested utils#Formula.values lists.
      output_action_ref:
        type: string
        description: >
          Key of a manifest action (form#ActionDef) triggered with the
          built formula when the user applies the filter.
        maxLength: 80
      preset_filters:
        type: array
        description: Named formula presets the user can select as a starting point.
        items:
          type: object
          required: [label, expression]
          additionalProperties: false
          properties:
            label:
              type: string
              maxLength: 60
            expression:
              type: string
              description: utils#Formula expression string.
              maxLength: 500

  AvatarConfig:
    type: object
    additionalProperties: false
    description: >
      Controls the Avatar component that renders uam#User.profiles data
      (nickName and photo). Used in comment threads, audit trail rows,
      and user-picker components.
    properties:
      show_photo:
        type: boolean
        default: true
        description: >
          Render uam#Profiles.photo as the avatar image.
          Falls back to initials when photo is absent or when false.
      show_nick_name:
        type: boolean
        default: true
        description: Show uam#Profiles.nickName alongside or below the avatar.
      fallback_style:
        type: string
        enum: [initials, icon, placeholder]
        default: initials
        description: >
          What to show when no photo is available.
            initials    — first letters of uam#User.name.
            icon        — a generic person icon (icon_ref below).
            placeholder — a neutral grey circle.
      fallback_icon_ref:
        type: string
        description: Key from manifest "icons". Used when fallback_style=icon.
        maxLength: 80
      size:
        type: string
        enum: [xs, sm, md, lg, xl]
        default: md
        description: Preset avatar diameter.
      shape:
        type: string
        enum: [circle, rounded, square]
        default: circle
      show_online_indicator:
        type: boolean
        default: false
        description: >
          Show a presence dot (online/offline) if the runtime provides
          presence data via context.


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  ROLE PREFERENCE OVERRIDE  (03_uam.yaml — uam#Role.preferences)        ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  RolePreferenceOverride:
    type: object
    additionalProperties: false
    description: >
      UI preference overrides applied to all users whose active uam#Role
      matches the key in the manifest "role_preferences" map.
      uam#Role.preferences is a Map<string> — this type formalises the
      well-known keys that the UI runtime understands.
      Unknown keys are forwarded to the custom preferences handler.
    properties:
      theme_extends:
        type: string
        description: >
          Name of a theme variant to layer on top of the manifest theme.
          Use to give, e.g., a Customer role a lighter palette.
        maxLength: 60
      default_locale:
        type: string
        description: BCP-47 locale code (e.g. "en-US", "ar-AE").
        maxLength: 20
      default_currency:
        type: string
        description: ISO 4217 currency code (e.g. "USD", "AED").
        maxLength: 3
      hidden_screens:
        type: array
        description: Screen keys hidden from this role's navigation.
        items:
          type: string
        uniqueItems: true
      hidden_components:
        type: array
        description: Component keys always hidden for this role.
        items:
          type: string
        uniqueItems: true
      column_visibility:
        type: object
        description: >
          Per-component default column visibility. Key = component key;
          value = list of field names to show. Remaining fields are hidden.
        additionalProperties:
          type: array
          items:
            type: string
      show_pro_fields:
        type: boolean
        description: >
          Override for the component-level show_pro_fields setting for this
          role. True = all proFields visible by default.
      items_per_page:
        type: integer
        minimum: 1
        description: Default pagination page size for list/table components.
      date_format:
        type: string
        description: >
          Preferred date display format (e.g. "DD/MM/YYYY", "MM-DD-YYYY").
        maxLength: 20
