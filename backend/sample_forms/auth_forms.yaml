# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  auth_forms.yaml — UISystemManifest v1.0.0                                  ║
# ║  Auth forms shipped as the backend reference.                               ║
# ║  The frontend bundles these locally so they render without a network call.  ║
# ║  The backend honours POST /auth/signin and POST /auth/signup.               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

manifest_id: auth
manifest_version: "1.0.0"
description: >
  Sign-in and sign-up forms for the Form Engine auth flow.
  on_submit.type is local — the page.tsx AuthPageInner component
  calls /auth/signin or /auth/signup directly via fetch().

namespaces: [core, uam, form, ui]

engine:
  mode: reactive
  evaluation_order: dependency
  error_mode: collect-all
  debounce_ms: 200

# ── Navigation routes for auth screens ────────────────────────────────────────
navigation:
  type: stack
  routes:
    signin_route:
      screen: signin_screen
      path: /auth/signin
      auth_required: false
    signup_route:
      screen: signup_screen
      path: /auth/signup
      auth_required: false

# ── Screens ───────────────────────────────────────────────────────────────────
screens:
  signin_screen:
    name: SignIn
    label: Sign In
    auth_rules:
      require_auth: false
    components:
      - component_ref: signin_form_component
        direction: Center

  signup_screen:
    name: SignUp
    label: Sign Up
    auth_rules:
      require_auth: false
    components:
      - component_ref: signup_form_component
        direction: Center

# ── Components ────────────────────────────────────────────────────────────────
components:
  signin_form_component:
    name: SignInFormComponent
    type: Form
    form_ref: signin
    form_embed:
      mode: inline

  signup_form_component:
    name: SignUpFormComponent
    type: Form
    form_ref: signup
    form_embed:
      mode: inline

# ── Forms ─────────────────────────────────────────────────────────────────────
forms:

  # ─── Sign In ────────────────────────────────────────────────────────────────
  signin:
    title: "Sign in"
    version: "1.0.0"
    form_state: active
    confidentiality: Public
    access:
      allowed_role_categories: [Customer, Employee, Partner, Contractor]
    layout:
      type: single-page
    submit_label: "Sign in"
    on_submit:
      type: local
      handler_name: handleSignin
      success_message: "Signed in successfully."
      error_message: "Invalid email or password."
    pages:
      - id: main
        title: "Credentials"
        sections:
          - id: credentials
            fields:
              - id: email
                type: text
                label: "Email address"
                required: true
                placeholder: "you@company.com"
                autocomplete: "email"
                validation:
                  pattern: "^[\\w.+-]+@[\\w-]+\\.[a-zA-Z]{2,}$"
                  pattern_message: "Please enter a valid email address"

              - id: password
                type: text
                label: "Password"
                required: true
                placeholder: "••••••••"
                autocomplete: "current-password"
                validation:
                  min_length: 6
                  min_length_message: "Password must be at least 6 characters"

  # ─── Sign Up ────────────────────────────────────────────────────────────────
  signup:
    title: "Create account"
    version: "1.0.0"
    form_state: active
    confidentiality: Public
    access:
      allowed_role_categories: [Customer, Employee, Partner, Contractor]
    layout:
      type: single-page
    submit_label: "Create account"
    on_submit:
      type: local
      handler_name: handleSignup
      success_message: "Account created. Welcome aboard!"
      error_message: "Could not create account. Please try again."
    pages:
      - id: main
        title: "Your details"
        sections:
          - id: identity
            fields:
              - id: full_name
                type: text
                label: "Full name"
                required: true
                placeholder: "Jane Smith"
                width: full
                autocomplete: "name"

              - id: email
                type: text
                label: "Email address"
                required: true
                placeholder: "you@company.com"
                width: full
                autocomplete: "email"
                validation:
                  pattern: "^[\\w.+-]+@[\\w-]+\\.[a-zA-Z]{2,}$"
                  pattern_message: "Please enter a valid email address"

              - id: password
                type: text
                label: "Password"
                required: true
                placeholder: "••••••••"
                hint: "At least 8 characters"
                autocomplete: "new-password"
                validation:
                  min_length: 8
                  min_length_message: "Password must be at least 8 characters"

              - id: confirm_password
                type: text
                label: "Confirm password"
                required: true
                placeholder: "••••••••"
                autocomplete: "new-password"
