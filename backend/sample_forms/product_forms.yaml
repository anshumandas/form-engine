# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  product_forms.yaml — UISystemManifest v1.0.0                               ║
# ║  Demonstrates: computed fields, conditional logic, multiple forms           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

manifest_id: product_forms
manifest_version: "1.0.0"
description: >
  Product feedback and checkout forms.
  Demonstrates computed fields, conditional sections, and static choices.

namespaces: [core, schemata, uam, form, ui]

engine:
  mode: reactive
  evaluation_order: dependency
  error_mode: collect-all
  debounce_ms: 200

conditions:
  wants_follow_up:
    description: "Trigger follow-up section for low ratings"
    condition:
      field: overall_rating
      op: lte
      value: 3

  is_business:
    description: "Show business billing fields when account type is business"
    condition:
      field: account_type
      op: eq
      value: business

  has_promo:
    description: "Show promo code field when user opts in"
    condition:
      field: has_promo_code
      op: is_true

forms:
  # ── 1. Product Feedback (single-page) ─────────────────────────────────────
  product_feedback:
    title: Product Feedback
    description: Help us improve — your feedback shapes our roadmap.
    version: "1.0.0"
    form_state: active
    confidentiality: Internal
    layout:
      type: single-page
    submit_label: Submit Feedback
    state:
      persistence: localStorage
      auto_save: true
    on_submit:
      type: none
      success_message: "🙏 Thanks for your feedback!"

    sections:
      - id: experience
        title: Your Experience
        fields:
          - id: overall_rating
            type: rating
            label: Overall Rating
            required: true
            max: 5
            display_as: stars
            low_label: Very Dissatisfied
            high_label: Very Satisfied

          - id: ease_of_use
            type: rating
            label: Ease of Use
            max: 5
            display_as: numeric-scale

          - id: value_for_money
            type: rating
            label: Value for Money
            max: 5
            display_as: numeric-scale

          - id: average_score
            type: number
            label: Average Score
            readonly: true
            system_generated: false
            width: half
            computed:
              expression: "(fields.overall_rating + fields.ease_of_use + fields.value_for_money) / 3"
              type_hint: number

      - id: follow_up
        title: Tell Us More
        condition:
          ref: wants_follow_up
        fields:
          - id: pain_point
            type: select
            label: What disappointed you most?
            required: true
            choices:
              static:
                - { value: performance, label: Performance }
                - { value: reliability, label: Reliability }
                - { value: pricing,     label: Pricing }
                - { value: support,     label: Customer Support }
                - { value: features,    label: Missing Features }
                - { value: ux,          label: User Experience }

          - id: follow_up_ok
            type: boolean
            label: Can we contact you about this?
            display_as: switch
            default: false

      - id: general
        title: General Comments
        fields:
          - id: comments
            type: multiline
            label: Additional Comments
            placeholder: Anything else you'd like to share…
            rows: 4
            max_length: 1000

          - id: recommend
            type: select
            label: How likely are you to recommend us?
            display_as: radio
            choices:
              static:
                - { value: definitely,  label: Definitely }
                - { value: probably,    label: Probably }
                - { value: unsure,      label: Not sure }
                - { value: unlikely,    label: Unlikely }

          - id: anonymous
            type: boolean
            label: Submit anonymously
            display_as: switch
            default: true

  # ── 2. Checkout Form (single-page) ────────────────────────────────────────
  checkout:
    title: Checkout
    description: Complete your order below.
    version: "1.0.0"
    form_state: active
    confidentiality: Confidential
    layout:
      type: single-page
    submit_label: Place Order
    on_submit:
      type: rest
      url: /api/submissions/
      method: POST
      success_message: "✅ Order placed! You'll receive a confirmation email shortly."

    sections:
      - id: account_type_section
        title: Account Type
        fields:
          - id: account_type
            type: select
            label: I am purchasing as
            required: true
            display_as: button-group
            choices:
              static:
                - { value: individual, label: Individual }
                - { value: business,   label: Business }

      - id: business_details
        title: Business Details
        condition:
          ref: is_business
        fields:
          - id: company_name
            type: text
            label: Company Name
            required: true
            width: half

          - id: gst_number
            type: text
            label: GST / Tax Number
            width: half

      - id: contact
        title: Contact Information
        fields:
          - id: first_name
            type: text
            label: First Name
            required: true
            width: half
            autocomplete: given-name

          - id: last_name
            type: text
            label: Last Name
            required: true
            width: half
            autocomplete: family-name

          - id: email
            type: text
            label: Email
            required: true
            autocomplete: email
            validation:
              pattern: "^[\\w.+-]+@[\\w-]+\\.[a-zA-Z]{2,}$"
              pattern_message: "Please enter a valid email address"

          - id: phone
            type: text
            label: Phone
            width: half
            autocomplete: tel

      - id: promo_section
        title: Promo Code
        fields:
          - id: has_promo_code
            type: boolean
            label: I have a promo code
            display_as: checkbox
            default: false

          - id: promo_code
            type: text
            label: Promo Code
            condition:
              ref: has_promo
            placeholder: "SAVE20"

      - id: payment
        title: Payment
        fields:
          - id: payment_method
            type: select
            label: Payment Method
            required: true
            display_as: radio
            choices:
              static:
                - { value: card,   label: Credit / Debit Card }
                - { value: upi,    label: UPI }
                - { value: netbanking, label: Net Banking }
                - { value: wallet, label: Wallet }

          - id: total_amount
            type: number
            label: Order Total (INR)
            readonly: true
            prefix: "₹"
            number_type: decimal2
            width: half
            system_generated: true

          - id: terms_accepted
            type: boolean
            label: I agree to the Terms of Service and Privacy Policy
            required: true
            display_as: checkbox
