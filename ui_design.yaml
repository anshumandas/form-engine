# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  06_ui_design.yaml  —  v1.0.0                                               ║
# ║  UI Design Schema — Extension to form_schema_v4                             ║
# ║                                                                              ║
# ║  Namespace:  ui                                                              ║
# ║  Depends on: form  (form_schema_v4.yaml)                                    ║
# ║              schemata, core, uam  (upstream namespaces)                     ║
# ║                                                                              ║
# ║  Incorporates all concepts from 05_ui.yaml and formalises them as           ║
# ║  first-class schema types with full JSON Schema validation.                 ║
# ║                                                                              ║
# ║  What this file defines                                                     ║
# ║  ─────────────────────────────────────────────────────────────────────────  ║
# ║  Enums      ComponentType · LayoutDirection · ButtonType                    ║
# ║             ButtonActionType · ScreenAccessType                             ║
# ║  Entities   Button · Component · Screen · Feature                           ║
# ║  New        Theme · DesignTokens · Breakpoint · NavigationConfig            ║
# ║             Route · Transition · GestureHandler · Toast · Dialog            ║
# ║             Accessibility · LoadingState · IconEntry · DataBinding          ║
# ║             ComponentLifecycle                                              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

$schema: "https://json-schema.org/draft/2020-12/schema"
$id:     "https://schemas.example.com/ui-design/v1/06_ui_design.yaml"
title:   UIDesignManifest

description: >
  Top-level manifest for the UI Design layer. Consumed by the UI runtime and
  code-generation tools.

  This schema is an extension of form_schema_v4.yaml: it imports its UIConfig,
  ComponentDef, ConfidentialityType, and ConditionOrRef definitions by
  namespace reference ("form#…") and adds a richer screen-and-component model
  drawn from 05_ui.yaml.

  Namespace contract:
    core     — Event, Audited, DataRef, Formula, Pattern
    schemata — Schema, Field, Relationship, Group
    uam      — RoleCategory, AccessLevel, Auth
    form     — FormEngineManifest, UIConfig, ComponentDef, Field, Section
    ui       — everything defined in this file

type: object
additionalProperties: false

# ─────────────────────────────────────────────────────────────────────────────
# TOP-LEVEL SECTIONS
# ─────────────────────────────────────────────────────────────────────────────
properties:

  # ── Document identity ───────────────────────────────────────────────────────
  manifest_id:
    type: string
    pattern: "^[a-z][a-z0-9_]*$"
    minLength: 2
    maxLength: 80
    description: >
      Unique identifier for this UI manifest.
      Used to namespace all screens and components defined within it.

  manifest_version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    default: "1.0.0"

  description:
    type: string
    maxLength: 2000

  # ── Namespace imports ────────────────────────────────────────────────────────
  namespaces:
    type: array
    description: >
      Ordered list of namespaces this manifest depends on.
      The runtime resolves "namespace#TypeName" cross-references using this list.
    items:
      type: string
      enum: [core, schemata, uam, form, ui]
    uniqueItems: true
    default: [core, schemata, uam, form, ui]

  # ── Design tokens & theme ────────────────────────────────────────────────────
  theme:
    $ref: "#/$defs/Theme"

  # ── Icon registry ────────────────────────────────────────────────────────────
  icons:
    type: object
    description: >
      Named icon definitions. Components and buttons reference icons by the
      key defined here rather than embedding raw paths inline.
    additionalProperties:
      $ref: "#/$defs/IconEntry"

  # ── Responsive breakpoints ───────────────────────────────────────────────────
  breakpoints:
    type: object
    description: >
      Named viewport breakpoints. Component visibility and layout rules may
      reference these by name (e.g., breakpoint: mobile).
    additionalProperties:
      $ref: "#/$defs/Breakpoint"

  # ── Navigation configuration ─────────────────────────────────────────────────
  navigation:
    $ref: "#/$defs/NavigationConfig"

  # ── Feature registry (from 05_ui.yaml — ui.feature) ─────────────────────────
  features:
    type: object
    description: >
      Named feature definitions. A feature groups components behind a UAM
      feature gate and is referenced by screens via feature_ref.
      Cross-references uam#Feature at runtime.
    additionalProperties:
      $ref: "#/$defs/Feature"

  # ── Reusable buttons (from 05_ui.yaml — ui.button) ──────────────────────────
  buttons:
    type: object
    description: >
      Named reusable button definitions. Components reference them by key.
    additionalProperties:
      $ref: "#/$defs/Button"

  # ── Reusable UI components (from 05_ui.yaml — ui.component) ─────────────────
  components:
    type: object
    description: >
      Named reusable view component definitions. Screens compose these via
      direction-keyed sub-component trees.
    additionalProperties:
      $ref: "#/$defs/Component"

  # ── Screen definitions (from 05_ui.yaml — ui.screen) ────────────────────────
  screens:
    type: object
    description: >
      Named screen definitions. The key is the screen's unique identifier and
      is used for navigation routing (e.g., push: screen_key).
    additionalProperties:
      $ref: "#/$defs/Screen"

  # ── Overlay / feedback primitives ────────────────────────────────────────────
  toasts:
    type: object
    description: Named toast / snackbar definitions.
    additionalProperties:
      $ref: "#/$defs/Toast"

  dialogs:
    type: object
    description: Named dialog / modal definitions.
    additionalProperties:
      $ref: "#/$defs/Dialog"

  # ── Transition library ───────────────────────────────────────────────────────
  transitions:
    type: object
    description: >
      Named transition/animation presets. Referenced by screens and components
      via transition_in / transition_out.
    additionalProperties:
      $ref: "#/$defs/Transition"


# ══════════════════════════════════════════════════════════════════════════════
# $defs
# ══════════════════════════════════════════════════════════════════════════════
$defs:

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  ENUMS (formalised from 05_ui.yaml choices blocks)                       ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  ComponentType:
    # 05_ui.yaml → ui.componentType
    type: string
    description: >
      Defines the visual pattern a Component uses to render its content.
        Tree         — hierarchical expandable/collapsible node structure.
        Table        — rows-and-columns data grid.
        Form         — field-input layout (bound to a form#Form).
        VerticalList — scrollable vertical list of items.
        HorizontalList — horizontally scrolling list (carousel-style).
        Search       — search box with result list.
        Card         — contained surface with optional header and actions.
        Tile         — compact fixed-size clickable tile (e.g. dashboard grid).
    enum: [Tree, Table, Form, VerticalList, HorizontalList, Search, Card, Tile]

  LayoutDirection:
    # 05_ui.yaml → ui.layoutDirection
    type: string
    description: >
      Controls where a sub-component is anchored within its parent.
        Center   — fills the central content area.
        Top      — docked to the top edge (e.g. header / app bar).
        Bottom   — docked to the bottom edge (e.g. tab bar / footer).
        Left     — docked to the left edge (e.g. sidebar / nav drawer).
        Right    — docked to the right edge (e.g. details panel).
        Floating — absolutely positioned overlay, does not push content.
        Modal    — rendered in a modal overlay, blocks interaction below.
      Multiple components may share the same direction — they stack in
      declaration order.
    enum: [Center, Top, Bottom, Left, Right, Floating, Modal]

  ButtonType:
    # 05_ui.yaml → ui.buttonType
    type: string
    description: >
      Visual presentation style of the button.
        Flat  — flat surface, no elevation (Material text/outlined button).
        Bevel — raised with drop shadow (filled/elevated button).
        Swipe — swipe-to-confirm interaction (destructive actions).
        Hover — visible only on pointer hover / focus.
    enum: [Flat, Bevel, Swipe, Hover]

  ButtonActionType:
    # 05_ui.yaml → ui.buttonActionType
    type: string
    description: >
      The built-in action semantics for a button's onPress handler.
      When one of the named actions is selected, the runtime handles it
      automatically. Use Custom when the handler must be hand-written.
        CaptchaCheckSubmit — validate captcha then submit the bound form.
        Submit             — submit the bound form (equivalent to form#onSubmit).
        Clear              — reset all fields in the bound form/component.
        Cancel             — discard changes and navigate back.
        Logout             — terminate the current auth session.
        Toggle             — toggle a boolean state (e.g., expand/collapse).
        Custom             — onPress is a hand-written handler function name.
    enum:
      [CaptchaCheckSubmit, Submit, Clear, Cancel, Logout, Toggle, Custom]

  ScreenAccessType:
    # 05_ui.yaml → ui.screenAccesType  (note: typo preserved from source)
    type: string
    description: >
      How a secondary screen is presented when accessed from its parent.
        Stacked       — pushed onto the navigation stack (full-screen replace).
        Drawer        — slides in as a side drawer over the current screen.
        PopupMenuTop  — dropdown menu anchored to the top of the trigger.
        PopupMenuBottom — dropdown menu anchored to the bottom of the trigger.
    enum: [Stacked, Drawer, PopupMenuTop, PopupMenuBottom]


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  ICON ENTRY  (new — supports the iconPath used in Button & Screen)       ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  IconEntry:
    type: object
    additionalProperties: false
    required: [type]
    description: >
      A single icon definition. Components and buttons reference icons by the
      key in the manifest-level "icons" map.
    properties:
      type:
        type: string
        enum: [svg, png, lucide, fontawesome, custom]
        description: >
          svg / png   — asset file served from the asset pipeline.
          lucide      — icon name from the Lucide icon library.
          fontawesome — icon name from FontAwesome (requires FA installed).
          custom      — hand-registered component name in the UI framework.
      path:
        type: string
        description: File path or URL for svg/png types.
        maxLength: 300
      name:
        type: string
        description: Icon name for lucide / fontawesome types.
        maxLength: 80
      component:
        type: string
        description: Registered component name for custom type.
        maxLength: 80
      alt:
        type: string
        description: Alt text for accessibility (a11y) screen readers.
        maxLength: 120


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  DESIGN TOKENS / THEME  (new)                                            ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  Theme:
    type: object
    additionalProperties: false
    description: >
      Global design token map applied to the entire app shell. Tokens follow
      the CSS custom property naming convention (--prefix-name).
      The "extends" key allows this theme to layer on top of a named base
      theme (e.g., "material", "ios-hig", "fluent").
    properties:

      extends:
        type: string
        description: Name of a base theme to extend (partial overrides only).
        maxLength: 60

      colors:
        type: object
        description: Semantic color tokens (hex #RRGGBB or CSS colour value).
        additionalProperties:
          type: string
          pattern: "^(#[A-Fa-f0-9]{6}|#[A-Fa-f0-9]{8}|[a-z].*)$"
        examples:
          - primary:        "006FFD"
            primary_light:  "5B9EF4"
            surface:        "FFFFFF"
            on_surface:     "1A1A2E"
            error:          "BA1A1A"
            warning:        "FF8C00"
            success:        "1B8A5A"

      typography:
        type: object
        additionalProperties: false
        description: Typography scale tokens.
        properties:
          font_family_default:
            type: string
            maxLength: 120
          font_family_mono:
            type: string
            maxLength: 120
          scale:
            type: object
            description: >
              Named text size tokens (px or rem). Keys become widget
              textSize presets (e.g., textSize: body_md).
            additionalProperties:
              type: [string, number]

      spacing:
        type: object
        description: Spacing scale tokens (px or rem).
        additionalProperties:
          type: [string, number]

      radius:
        type: object
        description: Border-radius tokens (px or rem).
        additionalProperties:
          type: [string, number]

      elevation:
        type: object
        description: Shadow / elevation tokens (CSS box-shadow strings).
        additionalProperties:
          type: string

      motion:
        type: object
        additionalProperties: false
        description: Motion / animation baseline tokens.
        properties:
          duration_fast_ms:
            type: integer
            minimum: 0
            default: 100
          duration_standard_ms:
            type: integer
            minimum: 0
            default: 250
          duration_slow_ms:
            type: integer
            minimum: 0
            default: 400
          easing_standard:
            type: string
            default: "cubic-bezier(0.4, 0, 0.2, 1)"
          easing_decelerate:
            type: string
            default: "cubic-bezier(0, 0, 0.2, 1)"
          easing_accelerate:
            type: string
            default: "cubic-bezier(0.4, 0, 1, 1)"

      dark_mode:
        type: object
        description: >
          Color token overrides applied when the OS / app is in dark mode.
          Keys must match keys defined in the top-level "colors" map.
        additionalProperties:
          type: string


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  BREAKPOINT  (new)                                                       ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  Breakpoint:
    type: object
    additionalProperties: false
    required: [min_width_px]
    description: >
      A named responsive breakpoint. Component layout and visibility rules
      reference these by the key in the manifest "breakpoints" map.
    properties:
      min_width_px:
        type: integer
        minimum: 0
        description: Minimum viewport width (inclusive) at which this breakpoint activates.
      max_width_px:
        type: [integer, "null"]
        description: Maximum viewport width (exclusive). Null means no upper bound.
      label:
        type: string
        description: Human-readable label (e.g., "Mobile", "Tablet", "Desktop").
        maxLength: 40
      columns:
        type: integer
        minimum: 1
        maximum: 24
        description: Default grid column count for this breakpoint.


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  NAVIGATION CONFIG  (new — wraps routing + tab bar + drawer)             ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  NavigationConfig:
    type: object
    additionalProperties: false
    description: >
      Declares the top-level navigation structure: which screens appear in the
      primary tab bar / drawer, the initial route, and global navigation guards.
    properties:

      initial_screen:
        type: string
        description: Key of the screen to show at app launch.
        minLength: 1

      type:
        type: string
        enum: [tab_bar, drawer, stack, none]
        default: tab_bar
        description: >
          tab_bar — bottom or top tab bar using navOrder + screens with isHome=true.
          drawer  — hamburger menu side drawer.
          stack   — pure stack with no persistent nav chrome.
          none    — navigation is handled entirely by hand-written code.

      tab_bar_position:
        type: string
        enum: [top, bottom]
        default: bottom
        description: Relevant only when type=tab_bar.

      routes:
        type: object
        description: >
          Named route definitions mapping path patterns to screen keys.
          Used by deep-link and web-based navigation.
        additionalProperties:
          $ref: "#/$defs/Route"

      guards:
        type: array
        description: >
          Ordered list of navigation guard names (registered on the navigator).
          Each guard runs before any screen transition and may redirect or block.
        items:
          type: string
          minLength: 1


  Route:
    type: object
    additionalProperties: false
    required: [screen]
    description: >
      Maps a URL path pattern to a screen and controls how path/query
      parameters are forwarded to the screen's context.
    properties:
      screen:
        type: string
        description: Key of the screen this route renders.
        minLength: 1
      path:
        type: string
        description: >
          URL path pattern. Segments prefixed with ":" are captured as params.
          Example: /orders/:orderId/detail
        maxLength: 300
      params:
        type: object
        description: >
          Maps path/query parameter names to screen context keys.
          Example: { orderId: context.currentOrderId }
        additionalProperties:
          type: string
      auth_required:
        type: boolean
        default: true
        description: Whether the route requires an authenticated session.
      feature_ref:
        type: string
        description: UAM feature gate name. Route is inaccessible if feature is off.
        maxLength: 80


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  FEATURE  (formalised from 05_ui.yaml — ui.feature)                     ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  Feature:
    type: object
    additionalProperties: false
    required: [name]
    description: >
      A named application feature that gates access to one or more components.
      Mirrors the uam#Feature definition — the authoritative RBAC definition
      lives in the uam namespace; this record declares the UI-side mapping.
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 80
        description: Unique feature identifier. Must match a uam#Feature name.
      label:
        type: string
        maxLength: 120
        description: Human-readable label shown in feature-flag admin UIs.
      confidentiality:
        $ref: "#/$defs/ConfidentialityType"
      components:
        type: array
        description: >
          Keys of components (from the manifest "components" map) whose
          visibility is gated by this feature. Replaces the 05_ui many-many
          relationship with an explicit list for simpler runtime evaluation.
        items:
          type: string
          minLength: 1
        uniqueItems: true


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  BUTTON  (formalised from 05_ui.yaml — ui.button)                       ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  Button:
    type: object
    additionalProperties: false
    required: [name, on_press]
    description: >
      A named reusable button definition. Components embed buttons via the
      "actions" list and reference them by key from the manifest "buttons" map,
      or define them inline within a component's actions array.
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 80
      label:
        type: string
        maxLength: 120
        description: Display text on the button. Supports i18n key lookup.
      button_type:
        $ref: "#/$defs/ButtonType"
        default: Flat
      on_press:
        type: string
        description: >
          Either a ButtonActionType enum value (handled automatically) or
          a custom handler function name registered on the UI engine.
          Use "Custom" as the enum value when providing a bespoke handler.
      custom_handler:
        type: string
        description: >
          Required when on_press is "Custom". Name of the handler function
          registered on the UI engine instance.
        maxLength: 80
      icon_ref:
        type: string
        description: Key from the manifest "icons" map.
        maxLength: 80
      icon_path:
        type: string
        description: >
          Fallback inline icon path (used if icon_ref is not provided).
          Prefer icon_ref for maintainability.
        maxLength: 300
      background_pic_path:
        type: string
        description: Optional background image path for the button surface.
        maxLength: 300
      text_size:
        type: [number, string]
        description: >
          Numeric px value, or a typography scale token key from theme.typography.scale.
      foreground_color:
        type: string
        pattern: "^[A-Fa-f0-9]{6}$"
        description: "Text / icon colour as 6-digit hex (no leading #)."
      background_color:
        type: string
        pattern: "^[A-Fa-f0-9]{6}$"
        description: "Button background fill as 6-digit hex (no leading #)."
      disabled_condition:
        $ref: "#/$defs/ConditionOrRef"
        description: When true, the button is rendered disabled.
      hidden_condition:
        $ref: "#/$defs/ConditionOrRef"
        description: When true, the button is not rendered at all.
      accessibility:
        $ref: "#/$defs/AccessibilityProps"
      confirm_dialog_ref:
        type: string
        description: >
          Key of a dialog (from manifest "dialogs") to show before the action
          fires. Useful for destructive actions (Cancel, Logout).
        maxLength: 80
      analytics_event:
        type: string
        description: Tracking event name emitted when the button is pressed.
        maxLength: 80


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  COMPONENT  (formalised from 05_ui.yaml — ui.component)                 ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  Component:
    type: object
    additionalProperties: false
    required: [name, type]
    description: >
      A named reusable view component. Components are placed on screens at a
      given LayoutDirection. If two components share the same direction within
      a screen they are stacked in declaration order.

      A component may bind to a schemata#Schema (via schema_ref) to drive
      data display/input. When type=Form the component may also reference a
      form#Form (via form_ref) to embed the full form engine.
    properties:

      name:
        type: string
        minLength: 1
        maxLength: 80
      label:
        type: string
        maxLength: 120
        description: Optional display title rendered in the component header.
      type:
        $ref: "#/$defs/ComponentType"

      # ── Data binding ──────────────────────────────────────────────────────
      schema_ref:
        type: string
        description: >
          Key of a schemata#Schema this component displays or inputs.
          The component uses this for column/field discovery and data queries.
        minLength: 1
      form_ref:
        type: string
        description: >
          Key of a form#Form (from the form namespace) to embed.
          Only valid when type=Form. Supersedes schema_ref when both present.
        minLength: 1
      data_binding:
        $ref: "#/$defs/DataBinding"

      # ── Display ───────────────────────────────────────────────────────────
      text:
        type: string
        description: >
          Static body text (multiline). Used for Card / Tile descriptors.
          Supports Markdown.
      text_size:
        type: [number, string]
        description: Numeric px or typography scale token key.
      foreground_color:
        type: string
        pattern: "^[A-Fa-f0-9]{6}$"
      background_color:
        type: string
        pattern: "^[A-Fa-f0-9]{6}$"
      background_pic_path:
        type: string
        maxLength: 300

      # ── Field / section filtering ──────────────────────────────────────────
      fields:
        type: array
        description: >
          When present, only the listed schema field names are rendered.
          An empty array means all fields are shown (no restriction).
        items:
          type: string
        uniqueItems: true
      sections:
        type: array
        description: >
          Names of schema groups or relationships to render as visual sections.
          A single string item may instead be a field name used for groupBy.
        items:
          type: string

      # ── Sub-components ────────────────────────────────────────────────────
      sub_components:
        type: array
        description: >
          Child components embedded within this component.
          Each entry places a sub-component at a LayoutDirection relative to
          this component's content area.
        items:
          $ref: "#/$defs/SubComponentPlacement"

      # ── Actions ───────────────────────────────────────────────────────────
      actions:
        type: array
        description: >
          Buttons rendered in the component's action area (header toolbar,
          FAB, etc.). Items may be inline Button definitions or references to
          named buttons in the manifest "buttons" map.
        items:
          oneOf:
            - $ref: "#/$defs/Button"
            - type: object
              required: [button_ref]
              additionalProperties: false
              properties:
                button_ref:
                  type: string
                  description: Key from the manifest "buttons" map.
                  minLength: 1

      # ── Layout & responsive ───────────────────────────────────────────────
      breakpoint_overrides:
        type: object
        description: >
          Per-breakpoint property overrides. Keys are breakpoint names from
          the manifest "breakpoints" map. Values are partial Component objects
          (any field can be overridden).
        additionalProperties:
          type: object

      # ── Visibility & access ───────────────────────────────────────────────
      feature_ref:
        type: string
        description: UAM feature gate. Component hidden if feature is off.
        maxLength: 80
      hidden_condition:
        $ref: "#/$defs/ConditionOrRef"
      visible_access_levels:
        type: array
        description: >
          form#AccessLevel values that may see this component. An empty list
          means all levels are permitted.
        items:
          $ref: "#/$defs/AccessLevel"
        uniqueItems: true

      # ── Lifecycle hooks ───────────────────────────────────────────────────
      lifecycle:
        $ref: "#/$defs/ComponentLifecycle"

      # ── Feedback states ───────────────────────────────────────────────────
      loading_state:
        $ref: "#/$defs/LoadingState"
      empty_state:
        type: object
        additionalProperties: false
        description: What to render when the data set is empty.
        properties:
          text:
            type: string
            maxLength: 300
          icon_ref:
            type: string
            maxLength: 80
          action_ref:
            type: string
            description: Key from manifest "buttons" to show as a primary call-to-action.
            maxLength: 80
      error_state:
        type: object
        additionalProperties: false
        description: What to render when data loading fails.
        properties:
          text:
            type: string
            maxLength: 300
          icon_ref:
            type: string
            maxLength: 80
          retry_action_ref:
            type: string
            maxLength: 80

      # ── Gestures ─────────────────────────────────────────────────────────
      gestures:
        type: array
        items:
          $ref: "#/$defs/GestureHandler"

      # ── Accessibility ─────────────────────────────────────────────────────
      accessibility:
        $ref: "#/$defs/AccessibilityProps"

      # ── Transitions ───────────────────────────────────────────────────────
      transition_in:
        type: string
        description: Key from manifest "transitions" — played when component mounts.
        maxLength: 80
      transition_out:
        type: string
        description: Key from manifest "transitions" — played when component unmounts.
        maxLength: 80

      # ── Analytics ────────────────────────────────────────────────────────
      analytics_id:
        type: string
        description: Tracking identifier emitted on component view events.
        maxLength: 80


  SubComponentPlacement:
    type: object
    additionalProperties: false
    required: [component_ref, direction]
    description: >
      Places a named component at a LayoutDirection within its parent.
    properties:
      component_ref:
        type: string
        description: Key from the manifest "components" map.
        minLength: 1
      direction:
        $ref: "#/$defs/LayoutDirection"
      breakpoint:
        type: string
        description: >
          Only render this sub-component at or above this named breakpoint.
        maxLength: 40
      hidden_condition:
        $ref: "#/$defs/ConditionOrRef"


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  SCREEN  (formalised from 05_ui.yaml — ui.screen)                       ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  Screen:
    type: object
    additionalProperties: false
    required: [name]
    description: >
      A full-screen view definition. A screen composes one or more Components
      at named LayoutDirections. The isHome flag marks screens that appear in
      the primary navigation bar or drawer, sorted by navOrder.
    properties:

      name:
        type: string
        minLength: 1
        maxLength: 80
      label:
        type: string
        maxLength: 120
        description: Navigation label shown in tab bar / drawer.
      icon_ref:
        type: string
        description: Key from manifest "icons" for the navigation icon.
        maxLength: 80
      icon_path:
        type: string
        description: Fallback inline icon path.
        maxLength: 300
      is_home:
        type: boolean
        default: false
        description: >
          When true this screen appears in the primary navigation bar/drawer.
          Home screens are sorted by nav_order.
      nav_order:
        type: integer
        minimum: 0
        description: >
          Sort order among home screens in the navigation bar / drawer.
          Lower values appear first. Ignored when is_home=false.

      # ── Component placement ───────────────────────────────────────────────
      components:
        type: array
        description: >
          Components placed on this screen. Each entry pairs a component
          reference with a LayoutDirection.
        items:
          $ref: "#/$defs/SubComponentPlacement"

      # ── Secondary screens ─────────────────────────────────────────────────
      secondary_screens:
        type: array
        description: >
          Screens that can be navigated to from this screen (child routes).
          Each entry declares the access type, an optional menu label, and
          a sort order for drawer / popup menus.
        items:
          $ref: "#/$defs/SecondaryScreenLink"

      # ── Access & visibility ───────────────────────────────────────────────
      feature_ref:
        type: string
        description: UAM feature gate. Screen hidden if feature is off.
        maxLength: 80
      allowed_role_categories:
        type: array
        description: >
          form#RoleCategory values permitted to view this screen.
          An empty list means all role categories are permitted.
        items:
          $ref: "#/$defs/RoleCategory"
        uniqueItems: true

      # ── Appearance ────────────────────────────────────────────────────────
      background_color:
        type: string
        pattern: "^[A-Fa-f0-9]{6}$"
      background_pic_path:
        type: string
        maxLength: 300

      # ── Lifecycle ─────────────────────────────────────────────────────────
      on_enter:
        type: string
        description: >
          Name of a form#ActionDef (or custom handler) invoked when
          this screen becomes active.
        maxLength: 80
      on_exit:
        type: string
        description: >
          Name of a form#ActionDef (or custom handler) invoked when
          the user navigates away from this screen.
        maxLength: 80
      on_back:
        type: string
        description: >
          Name of a handler invoked when the hardware/gesture back action
          fires. If omitted, the default stack pop behaviour applies.
        maxLength: 80

      # ── Transitions ───────────────────────────────────────────────────────
      transition_in:
        type: string
        description: Key from manifest "transitions" — screen enter animation.
        maxLength: 80
      transition_out:
        type: string
        description: Key from manifest "transitions" — screen exit animation.
        maxLength: 80

      # ── Status bar / chrome ───────────────────────────────────────────────
      status_bar:
        type: object
        additionalProperties: false
        description: Native status bar styling for mobile platforms.
        properties:
          style:
            type: string
            enum: [light, dark, auto]
            default: auto
          background_color:
            type: string
            pattern: "^[A-Fa-f0-9]{6}$"

      # ── Analytics ────────────────────────────────────────────────────────
      analytics_id:
        type: string
        description: Tracking identifier emitted on screen view events.
        maxLength: 80


  SecondaryScreenLink:
    type: object
    additionalProperties: false
    required: [screen_ref, access_type]
    description: >
      Declares the relationship between a parent screen and a screen it can
      navigate to, including how the child is presented.
    properties:
      screen_ref:
        type: string
        description: Key from the manifest "screens" map.
        minLength: 1
      access_type:
        $ref: "#/$defs/ScreenAccessType"
      menu_label:
        type: string
        description: Label used when this screen appears in a popup menu or drawer.
        maxLength: 80
      menu_order:
        type: integer
        minimum: 0
        description: Sort order within a popup menu or drawer group.
      hidden_condition:
        $ref: "#/$defs/ConditionOrRef"
        description: Hide this navigation link when the condition is true.
      params:
        type: object
        description: >
          Static or expression-derived parameters forwarded to the
          secondary screen's context on navigation.
        additionalProperties:
          type: string


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  DATA BINDING  (new — drives component data queries)                     ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  DataBinding:
    type: object
    additionalProperties: false
    description: >
      Declares how a component fetches and writes its data.
      Replaces bare "schema_ref" for components that need more than the
      default CRUD data source.
    properties:
      source_ref:
        type: string
        description: >
          Key of a form#DataSourceDef. The component calls this data source
          to populate its list / form / table.
        minLength: 1
      query_params:
        type: object
        description: >
          Static or expression-derived query parameters forwarded to the
          data source. Supports {{context.*}} and {{fields.*}} interpolation.
        additionalProperties:
          type: string
      write_action_ref:
        type: string
        description: >
          Key of a form#ActionDef invoked when the component submits data
          (create or update). Defaults to the form on_submit action when
          type=Form.
        maxLength: 80
      delete_action_ref:
        type: string
        description: >
          Key of a form#ActionDef invoked when the user deletes a record
          from this component (Table, VerticalList).
        maxLength: 80
      pagination:
        type: object
        additionalProperties: false
        description: Server-side pagination config for list/table components.
        properties:
          type:
            type: string
            enum: [cursor, page_number, offset, none]
            default: none
          page_size:
            type: integer
            minimum: 1
            default: 20
          page_param:
            type: string
            default: page
          size_param:
            type: string
            default: per_page
      sort:
        type: object
        additionalProperties: false
        description: Default sort configuration for list/table components.
        properties:
          field:
            type: string
          direction:
            type: string
            enum: [asc, desc]
            default: asc
      polling_interval_ms:
        type: [integer, "null"]
        minimum: 0
        description: >
          When set, the component re-fetches data at this interval (ms).
          Null disables polling.
      optimistic_updates:
        type: boolean
        default: false
        description: >
          When true, write operations update the local cache immediately
          before the server confirms, and roll back on error.


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  COMPONENT LIFECYCLE HOOKS  (new)                                        ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  ComponentLifecycle:
    type: object
    additionalProperties: false
    description: >
      Named handlers invoked at key points in a component's lifecycle.
      Handler names must be registered on the UI engine instance.
    properties:
      on_mount:
        type: string
        maxLength: 80
        description: Fired when the component first mounts into the view tree.
      on_unmount:
        type: string
        maxLength: 80
        description: Fired when the component is removed from the view tree.
      on_focus:
        type: string
        maxLength: 80
        description: Fired when the component (or any child) gains focus.
      on_blur:
        type: string
        maxLength: 80
        description: Fired when the component (or any child) loses focus.
      on_data_load:
        type: string
        maxLength: 80
        description: Fired after the component's data source returns successfully.
      on_data_error:
        type: string
        maxLength: 80
        description: Fired when the component's data source returns an error.
      on_refresh:
        type: string
        maxLength: 80
        description: Fired when the user performs a pull-to-refresh gesture.


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  TRANSITION / ANIMATION  (new)                                           ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  Transition:
    type: object
    additionalProperties: false
    required: [type]
    description: >
      A named animation preset referenced by screens and components via
      transition_in / transition_out.
    properties:
      type:
        type: string
        enum:
          [fade, slide_left, slide_right, slide_up, slide_down,
           scale, flip, shared_element, custom]
      duration_ms:
        type: integer
        minimum: 0
        default: 250
      easing:
        type: string
        description: CSS easing function or a motion token key from theme.motion.
        maxLength: 100
      delay_ms:
        type: integer
        minimum: 0
        default: 0
      custom_handler:
        type: string
        description: Handler name for type=custom transitions.
        maxLength: 80
      shared_element_tag:
        type: string
        description: >
          Tag name for shared-element transitions. The source and destination
          components must declare the same tag.
        maxLength: 80


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  GESTURE HANDLER  (new)                                                  ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  GestureHandler:
    type: object
    additionalProperties: false
    required: [gesture, action_ref]
    description: >
      Binds a touch/pointer gesture to a named action.
    properties:
      gesture:
        type: string
        enum:
          [tap, double_tap, long_press, swipe_left, swipe_right,
           swipe_up, swipe_down, pinch, spread, rotate]
      action_ref:
        type: string
        description: Key of a form#ActionDef or a custom handler name.
        minLength: 1
      condition:
        $ref: "#/$defs/ConditionOrRef"
        description: Gesture only active when condition is true.
      min_distance_px:
        type: integer
        minimum: 0
        description: Minimum gesture distance to trigger (swipe gestures).
      long_press_duration_ms:
        type: integer
        minimum: 0
        default: 500


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  LOADING STATE  (new)                                                    ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  LoadingState:
    type: object
    additionalProperties: false
    description: >
      Controls how a component communicates a loading / pending state to the
      user while data is being fetched or an action is in progress.
    properties:
      style:
        type: string
        enum: [spinner, skeleton, shimmer, progress_bar, overlay, none]
        default: skeleton
      skeleton_rows:
        type: integer
        minimum: 1
        maximum: 20
        default: 3
        description: Number of skeleton placeholder rows (skeleton / shimmer styles).
      overlay_opacity:
        type: number
        minimum: 0
        maximum: 1
        default: 0.6
        description: Overlay opacity (0–1) for the overlay style.
      min_display_ms:
        type: integer
        minimum: 0
        default: 400
        description: >
          Minimum time the loading indicator is shown to avoid flicker on fast
          responses.


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  TOAST  (new)                                                            ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  Toast:
    type: object
    additionalProperties: false
    required: [message]
    description: >
      A non-blocking ephemeral notification shown at the screen edge.
      Triggered by form actions or component events via a toast_ref.
    properties:
      message:
        type: string
        maxLength: 300
        description: Toast body text. Supports i18n key lookup.
      severity:
        type: string
        enum: [info, success, warning, error]
        default: info
      duration_ms:
        type: integer
        minimum: 0
        default: 3000
        description: Auto-dismiss duration in milliseconds. 0 = persist until dismissed.
      position:
        type: string
        enum: [top, top_left, top_right, bottom, bottom_left, bottom_right]
        default: bottom
      action_label:
        type: string
        maxLength: 40
        description: Optional inline action label (e.g., "Undo").
      action_ref:
        type: string
        description: form#ActionDef key triggered when the toast action is tapped.
        maxLength: 80
      icon_ref:
        type: string
        maxLength: 80


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  DIALOG  (new — replaces ad-hoc Modal direction usage)                   ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  Dialog:
    type: object
    additionalProperties: false
    required: [title]
    description: >
      A modal dialog / alert definition. Referenced by buttons via
      confirm_dialog_ref and by actions via action type=show_dialog.
    properties:
      title:
        type: string
        maxLength: 120
      body:
        type: string
        maxLength: 2000
        description: Dialog body text. Supports Markdown.
      icon_ref:
        type: string
        maxLength: 80
      severity:
        type: string
        enum: [info, success, warning, error, neutral]
        default: neutral
      dismissible:
        type: boolean
        default: true
        description: >
          Whether the user can dismiss the dialog by tapping outside it
          or pressing the back/escape key.
      primary_action:
        $ref: "#/$defs/Button"
        description: Primary (confirm) action button.
      secondary_action:
        $ref: "#/$defs/Button"
        description: Secondary (cancel / dismiss) action button.
      component_ref:
        type: string
        description: >
          Key from manifest "components" to embed as the dialog body.
          Takes precedence over "body" text when both are present.
        maxLength: 80
      max_width_px:
        type: integer
        minimum: 200
        default: 480


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  ACCESSIBILITY PROPS  (new)                                              ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  AccessibilityProps:
    type: object
    additionalProperties: false
    description: >
      WCAG 2.1 / platform accessibility annotations for a component or button.
    properties:
      label:
        type: string
        maxLength: 200
        description: >
          Screen reader label. Overrides the visible label/text when set.
          Use when the visual label is ambiguous (e.g., icon-only buttons).
      hint:
        type: string
        maxLength: 300
        description: >
          Screen reader hint — describes the result of interacting with
          the element (e.g., "Opens the order detail screen").
      role:
        type: string
        enum:
          [button, link, heading, image, list, listitem, checkbox, radio,
           switch, slider, tab, tabpanel, dialog, alert, status, none]
        description: Overrides the implicit ARIA role.
      live_region:
        type: string
        enum: [off, polite, assertive]
        default: off
        description: >
          Screen reader live region behaviour. Use "polite" for status
          updates, "assertive" for urgent errors.
      keyboard_shortcut:
        type: string
        maxLength: 20
        description: >
          Keyboard shortcut string (e.g., "Ctrl+S", "Alt+N"). Registered
          globally while the screen/component is active.
      focus_order:
        type: integer
        minimum: 0
        description: >
          Explicit tab/focus order override. 0 = removed from tab order.
          Prefer leaving this unset and using natural DOM/view order.
      min_touch_target_px:
        type: integer
        minimum: 0
        default: 44
        description: Minimum touch target size enforced by the layout engine (px).


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  MIRROR REFS (from form_schema_v4 — avoids duplication)                  ║
  # ║  These types are authoritative in form_schema_v4 but are mirrored here  ║
  # ║  so this schema validates standalone without a live $ref resolver.       ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  ConfidentialityType:
    description: "[Mirror of form#ConfidentialityType — authoritative in form_schema_v4.yaml]"
    type: string
    enum: [Public, Internal, Confidential, Restricted, Secret]

  AccessLevel:
    description: "[Mirror of form#AccessLevel — authoritative in form_schema_v4.yaml]"
    type: string
    enum: [Self, Delegated, Team, Reportee, Category]

  RoleCategory:
    description: "[Mirror of form#RoleCategory — authoritative in form_schema_v4.yaml]"
    type: string
    enum: [Customer, Employee, Partner, Contractor, Automaton]

  ConditionOrRef:
    description: >
      [Mirror of form#ConditionOrRef — authoritative in form_schema_v4.yaml]
      A condition expression string, a structured Condition object, or a
      reference to a named condition in the form manifest.
    oneOf:
      - type: string
        minLength: 1
        maxLength: 1000
      - type: object
        required: [ref]
        additionalProperties: false
        properties:
          ref:
            type: string
            minLength: 1
      - type: object
        required: [field, operator]
        additionalProperties: false
        properties:
          field:
            type: string
          operator:
            type: string
            enum: [eq, ne, gt, gte, lt, lte, in, not_in, contains,
                   starts_with, ends_with, is_empty, is_not_empty]
          value: {}

